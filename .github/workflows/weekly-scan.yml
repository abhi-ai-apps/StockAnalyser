name: Weekly S&P 500 Scan

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday 9AM ET (14:00 UTC)
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_SCAN == 'true'
    permissions:
      issues: write          # Create GitHub Issues
      contents: write        # Push to gh-pages branch

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run weekly scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}       # optional
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}         # auto-provided by GitHub
          GITHUB_REPO: ${{ github.repository }}             # e.g. yourname/repo
          ENABLE_SCAN: ${{ vars.ENABLE_SCAN }}              # repo variable kill-switch
        run: node scripts/weekly-scan.js

      - name: Deploy dashboard to GitHub Pages
        if: always()
        uses: JamesIves/github-pages-deploy-action@v4
        continue-on-error: true
        with:
          folder: dist
          branch: gh-pages
          single-commit: true
